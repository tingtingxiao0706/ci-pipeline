name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'
        type: string
  push:
    branches: [ main ]

# Cancel in-progress runs on new commits for same workflow
concurrency:
  group: ${{ github.workflow }}-deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.event.inputs.image_tag || github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-cache,mode=max

      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/ci-pipeline
            docker-compose pull
            docker-compose up -d

      - name: Health check
        run: |
          curl -f ${{ secrets.DEV_URL }}/health || exit 1

      - name: Notify Success (Dev)
        if: success()
        run: |
          echo "✅ Dev deployment successful"
          # Send notification to Slack/Teams/etc if webhook configured
          if [ -n "${{ secrets.NOTIFICATION_WEBHOOK }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Dev deployment completed: ${{ github.sha }}\"}" \
              ${{ secrets.NOTIFICATION_WEBHOOK }}
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.event.inputs.image_tag || github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-cache,mode=max

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/ci-pipeline
            docker-compose pull
            docker-compose up -d

      - name: Health check
        run: |
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1

      - name: Notify Success (Staging)
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          # Send notification
          if [ -n "${{ secrets.NOTIFICATION_WEBHOOK }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Staging deployment completed: ${{ github.sha }}\"}" \
              ${{ secrets.NOTIFICATION_WEBHOOK }}
          fi

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod'
    environment: production
    # This requires manual approval in GitHub Actions UI
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag || github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-cache,mode=max

      - name: Wait for manual approval
        run: |
          echo "✅ Manual approval received, proceeding with production deployment..."

      - name: Deploy to Production (Blue-Green)
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /opt/ci-pipeline
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag || github.sha }}"

            echo "Pulling new image: \$IMAGE"
            docker pull "\$IMAGE"

            # Start new container with different name
            docker run -d \
              --name "${{ env.IMAGE_NAME }}-new" \
              --restart unless-stopped \
              --env-file .env \
              -p 8081:8080 \
              "\$IMAGE"

            # Wait for health check
            echo "Waiting for new container to be healthy..."
            for i in {1..30}; do
              if curl -f http://localhost:8081/health; then
                echo "New container is healthy!"
                break
              fi
              sleep 2
            done

            # Switch traffic (nginx reload or update docker-compose)
            if [ -f "docker-compose.yml" ]; then
              # Update docker-compose to point to new image
              sed -i "s|image:.*|\image: \$IMAGE|" docker-compose.yml
              docker-compose up -d
            else
              # Stop old and rename
              docker stop "${{ env.IMAGE_NAME }}" 2>/dev/null || true
              docker rm "${{ env.IMAGE_NAME }}" 2>/dev/null || true
              docker rename "${{ env.IMAGE_NAME }}-new" "${{ env.IMAGE_NAME }}"
            fi

            echo "✅ Production deployment completed!"

      - name: Health check (Production)
        run: |
          curl -f ${{ secrets.PROD_URL }}/health || exit 1

      - name: Notify Production Success
        if: success()
        run: |
          echo "🚀 Production deployment successful: ${{ github.sha }}"
          if [ -n "${{ secrets.NOTIFICATION_WEBHOOK }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\":rocket: Production deployment completed: ${{ github.sha }}\"}" \
              ${{ secrets.NOTIFICATION_WEBHOOK }}
          fi

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()

    steps:
      - name: Cleanup old Docker images
        uses: docker/setup-buildx-action@v3

      - name: Prune old images
        run: |
          docker system prune -af --filter "until=168h"
        continue-on-error: true
